name: DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Code Quality & SAST
  sast-scan:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
      working-directory: ./juice-shop
      
    - name: Run npm audit
      run: npm audit --audit-level=moderate
      working-directory: ./juice-shop
      continue-on-error: true
      
    - name: Run npm audit fix
      run: npm audit fix
      working-directory: ./juice-shop
      continue-on-error: true
      
    - name: Save npm audit results
      run: npm audit --json > npm-audit-results.json
      working-directory: ./juice-shop
      continue-on-error: true
      
    - name: Upload SAST results
      uses: actions/upload-artifact@v3
      with:
        name: sast-results
        path: juice-shop/npm-audit-results.json

  # Job 2: Software Composition Analysis (SCA)
  sca-scan:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    needs: sast-scan
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Run Trivy vulnerability scanner in fs mode
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './juice-shop'
        format: 'json'
        output: 'trivy-fs-results.json'
        severity: 'CRITICAL,HIGH,MEDIUM'
        
    - name: Upload SCA results
      uses: actions/upload-artifact@v3
      with:
        name: sca-results
        path: trivy-fs-results.json

  # Job 3: Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast-scan, sca-scan]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build Docker image
      run: |
        docker build -t juice-shop:${{ github.sha }} ./juice-shop
        docker tag juice-shop:${{ github.sha }} juice-shop:latest
        
    - name: Save Docker image
      run: docker save juice-shop:latest -o juice-shop-image.tar
      
    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: juice-shop-image.tar

  # Job 4: Container Security Scan
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Download Docker image
      uses: actions/download-artifact@v3
      with:
        name: docker-image
        
    - name: Load Docker image
      run: docker load -i juice-shop-image.tar
      
    - name: Run Trivy vulnerability scanner on Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'juice-shop:latest'
        format: 'json'
        output: 'trivy-image-results.json'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'
        
    - name: Upload container scan results
      uses: actions/upload-artifact@v3
      with:
        name: container-scan-results
        path: trivy-image-results.json

  # Job 5: Deploy and DAST
  dast-scan:
    name: Dynamic Application Security Testing
    runs-on: ubuntu-latest
    needs: container-scan
    
    steps:
    - name: Download Docker image
      uses: actions/download-artifact@v3
      with:
        name: docker-image
        
    - name: Load and run Docker image
      run: |
        docker load -i juice-shop-image.tar
        docker run -d -p 3000:3000 --name juice-shop juice-shop:latest
        
    - name: Wait for application to start
      run: |
        echo "Waiting for Juice Shop to start..."
        timeout 60 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'
        
    - name: Run OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.7.0
      with:
        target: 'http://localhost:3000'
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-a -j'
        
    - name: Upload DAST results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: dast-results
        path: report_html.html

  # Job 6: Security Gate
  security-gate:
    name: Security Quality Gate
    runs-on: ubuntu-latest
    needs: [sast-scan, sca-scan, container-scan, dast-scan]
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      
    - name: Check security thresholds
      run: |
        echo "=== Security Gate Check ==="
        echo "Checking for critical vulnerabilities..."
        
        # Check npm audit
        CRITICAL_COUNT=$(cat sast-results/npm-audit-results.json | jq '.metadata.vulnerabilities.critical // 0')
        echo "Critical npm vulnerabilities: $CRITICAL_COUNT"
        
        # Threshold: Fail if more than 5 critical
        if [ "$CRITICAL_COUNT" -gt 5 ]; then
          echo "❌ Security Gate FAILED: Too many critical vulnerabilities"
          exit 1
        fi
        
        echo "✅ Security Gate PASSED"
        
    - name: Generate security summary
      run: |
        echo "# Security Scan Summary" > security-summary.md
        echo "" >> security-summary.md
        echo "## Scan Results" >> security-summary.md
        echo "- ✅ SAST Scan: Completed" >> security-summary.md
        echo "- ✅ SCA Scan: Completed" >> security-summary.md
        echo "- ✅ Container Scan: Completed" >> security-summary.md
        echo "- ✅ DAST Scan: Completed" >> security-summary.md
        
    - name: Upload summary
      uses: actions/upload-artifact@v3
      with:
        name: security-summary
        path: security-summary.md
