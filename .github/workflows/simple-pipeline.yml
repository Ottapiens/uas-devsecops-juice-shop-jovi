name: Simple DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd juice-shop
        npm install --prefer-offline --no-audit
      continue-on-error: true
    
    - name: Run npm audit
      run: |
        cd juice-shop
        npm audit --json > ../npm-audit.json || true
        echo "npm audit completed"
      continue-on-error: true
    
    - name: Run Trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'juice-shop'
        format: 'table'
      continue-on-error: true
    
    - name: Build Docker image
      run: |
        cd juice-shop
        docker build -t juice-shop:test .
    
    - name: Scan Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'juice-shop:test'
        format: 'table'
      continue-on-error: true
    
    - name: Summary
      run: |
        echo "### Security Scan Complete ✅" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "All security scans have been executed." >> $GITHUB_STEP_SUMMARY
